spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/unibond
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: ${MAIL_STARTTLS:true}
      mail.smtp.ssl.enable: ${MAIL_SSL:false}

logging:
  level:
    com.unibond: INFO

server:
  port: 8080
