name: UniBond
options:
  bundleIdPrefix: com.unibond
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  UniBond:
    type: application
    platform: iOS
    sources:
      - path: UniBond
        excludes:
          - "UniBondWidget/**"
          - "UniBondLiveActivity/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unibond.app
        INFOPLIST_FILE: UniBond/Info.plist
        CODE_SIGN_ENTITLEMENTS: UniBond/UniBond.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: UniBond/UniBond.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.unibond.shared
        aps-environment: development
    dependencies:
      - target: UniBondWidget
      - target: UniBondLiveActivity
    info:
      path: UniBond/Info.plist
      properties:
        CFBundleDisplayName: UniBond
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            localhost:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true

  UniBondWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: UniBond/UniBondWidget
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unibond.app.UniBondWidget
        INFOPLIST_FILE: UniBond/UniBondWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: UniBond/UniBondWidget/UniBondWidget.entitlements

        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
    entitlements:
      path: UniBond/UniBondWidget/UniBondWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.unibond.shared
    info:
      path: UniBond/UniBondWidget/Info.plist
      properties:
        CFBundleDisplayName: UniBondWidget
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  UniBondLiveActivity:
    type: app-extension
    platform: iOS
    sources:
      - path: UniBond/UniBondLiveActivity
    dependencies:
      - sdk: ActivityKit.framework
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unibond.app.UniBondLiveActivity
        INFOPLIST_FILE: UniBond/UniBondLiveActivity/Info.plist
        CODE_SIGN_ENTITLEMENTS: UniBond/UniBondLiveActivity/UniBondLiveActivity.entitlements

        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
    entitlements:
      path: UniBond/UniBondLiveActivity/UniBondLiveActivity.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.unibond.shared
    info:
      path: UniBond/UniBondLiveActivity/Info.plist
      properties:
        CFBundleDisplayName: UniBondLiveActivity
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
